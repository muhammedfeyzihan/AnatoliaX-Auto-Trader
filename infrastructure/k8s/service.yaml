apiVersion: v1
kind: Service
metadata:
  name: anatoliax-core
  namespace: anatoliax
  labels:
    app.kubernetes.io/name: anatoliax
    app.kubernetes.io/component: core
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: anatoliax
    app.kubernetes.io/component: core
  ports:
    - name: http
      port: 3001
      targetPort: 3001
      protocol: TCP
    - name: ws
      port: 8080
      targetPort: 8080
      protocol: TCP
    - name: dashboard
      port: 8081
      targetPort: 8081
      protocol: TCP

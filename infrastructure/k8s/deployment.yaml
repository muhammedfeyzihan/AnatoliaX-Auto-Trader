apiVersion: apps/v1
kind: Deployment
metadata:
  name: anatoliax-core
  namespace: anatoliax
  labels:
    app.kubernetes.io/name: anatoliax
    app.kubernetes.io/component: core
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: anatoliax
      app.kubernetes.io/component: core
  template:
    metadata:
      labels:
        app.kubernetes.io/name: anatoliax
        app.kubernetes.io/component: core
    spec:
      restartPolicy: Always
      containers:
        - name: anatoliax-core
          image: anatoliax/anatoliax:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3001
              protocol: TCP
            - name: ws
              containerPort: 8080
              protocol: TCP
            - name: dashboard
              containerPort: 8081
              protocol: TCP
          envFrom:
            - configMapRef:
                name: anatoliax-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: anatoliax-secrets
                  key: DATABASE_URL
            - name: AX_KIMI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: anatoliax-secrets
                  key: AX_KIMI_API_KEY
            - name: AX_TELEGRAM_TOKEN
              valueFrom:
                secretKeyRef:
                  name: anatoliax-secrets
                  key: AX_TELEGRAM_TOKEN
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: logs
              mountPath: /app/logs
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 60
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 2
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: anatoliax-data
        - name: logs
          emptyDir: {}
